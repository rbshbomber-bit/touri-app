name: Touri Build

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: touri-build-${{ github.ref }}
  cancel-in-progress: true

# GitHub Pages 배포에 필요한 권한
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  android:
    name: Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Prepare runtime assets (.env, touri_lora_url.txt)
        run: |
          # .env — GitHub Secrets 있으면 사용, 없으면 빈 파일 (fallback 동작)
          {
            [ -n "${{ secrets.FAL_KEY }}" ] && echo "FAL_KEY=${{ secrets.FAL_KEY }}"
            [ -n "${{ secrets.ANTHROPIC_API_KEY }}" ] && echo "ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}"
          } > .env
          # touri_lora_url.txt — secret 있으면 진짜 LoRA URL, 없으면 빈 파일
          if [ -n "${{ secrets.TOURI_LORA_URL }}" ]; then
            echo "${{ secrets.TOURI_LORA_URL }}" > touri_lora_url.txt
          else
            touch touri_lora_url.txt
          fi

      - name: Flutter pub get
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: touri-apk-${{ github.sha }}
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

  web:
    name: Web Build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Prepare runtime assets (.env, touri_lora_url.txt)
        run: |
          # .env — GitHub Secrets 있으면 사용, 없으면 빈 파일 (fallback 동작)
          {
            [ -n "${{ secrets.FAL_KEY }}" ] && echo "FAL_KEY=${{ secrets.FAL_KEY }}"
            [ -n "${{ secrets.ANTHROPIC_API_KEY }}" ] && echo "ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}"
          } > .env
          # touri_lora_url.txt — secret 있으면 진짜 LoRA URL, 없으면 빈 파일
          if [ -n "${{ secrets.TOURI_LORA_URL }}" ]; then
            echo "${{ secrets.TOURI_LORA_URL }}" > touri_lora_url.txt
          else
            touch touri_lora_url.txt
          fi

      - name: Flutter pub get
        run: flutter pub get

      - name: Build Web (base-href = /touri-app/)
        run: flutter build web --release --base-href "/touri-app/"

      - name: Upload Web Build
        uses: actions/upload-artifact@v4
        with:
          name: touri-web-${{ github.sha }}
          path: build/web/
          retention-days: 14

      - name: GitHub Pages 배포용 아티팩트
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web/

  # ─── GitHub Pages 배포 ──────────────────────────
  deploy_web:
    name: 🌐 Deploy Web → GitHub Pages
    needs: web
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
