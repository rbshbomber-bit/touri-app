name: touri
description: "토우리 - 함께 꾸미는 manifestation 다이어리"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  shared_preferences: ^2.3.2
  http: ^1.2.0
  flutter_dotenv: ^5.1.0
  path_provider: ^2.1.4
  share_plus: ^10.0.2
  xml: ^6.5.0
  url_launcher: ^6.3.1
  image_picker: ^1.1.2
  flame: ^1.18.0  # 2D 게임 엔진 (Day 1: 도입)

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/character/scenes/
    - assets/character/scenes/thumbs/
    - assets/character/generated/
    - assets/character/menu_icons/
    - assets/character/news_categories/
    - assets/character/spirituality/
    - assets/character/empty_states/
    - assets/character/sticker_base/
    - assets/character/packs/spring/
    - assets/character/packs/summer/
    - assets/character/packs/autumn/
    - assets/character/packs/valentine/
    - assets/character/pet/
    - .env
    - touri_lora_url.txt
